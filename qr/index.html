<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Redirigiendo…</title>
<style>
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0d0817;color:#f3edff;font-family:sans-serif}
</style>
</head>
<body>
<p>Un momento… ✨</p>
<script>
(function () {
  // Fallback si el JSON falla o tarda
  var FALLBACK = 'https://futurich90.github.io/fungifeeling/';
  // Permite varios QR con un solo archivo: qr/?c=whatsapp usa la clave "whatsapp"
  var key = new URLSearchParams(location.search).get('c') || 'default';
  var timeout = setTimeout(function () { location.replace(FALLBACK); }, 4000);
  fetch('destino.json?v=' + Date.now(), { cache: 'no-store' })
    .then(function (r) { return r.json(); })
    .then(function (d) {
      clearTimeout(timeout);
      location.replace(d[key] || d['default'] || FALLBACK);
    })
    .catch(function () {
      clearTimeout(timeout);
      location.replace(FALLBACK);
    });
})();
</script>
</body>
</html>
